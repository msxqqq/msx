<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>常用代码列表</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/dockerfile.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/toml.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--bdr:#30363d;--txt:#c9d1d9;--dim:#8b949e;--acc:#58a6ff;--ach:#79c0ff;--ok:#3fb950;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:24px}
.wrap{max-width:960px;margin:0 auto}
h1{font-size:24px;font-weight:600;color:#f0f6fc;margin-bottom:6px}
.sub{color:var(--dim);font-size:13px;margin-bottom:28px}
.sub code{background:#1c2128;padding:1px 6px;border-radius:4px;font-size:12px;border:1px solid var(--bdr)}
.row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--card);color:var(--txt);cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--acc);color:var(--ach)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.srch{flex:1;min-width:200px;padding:7px 12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--card);color:var(--txt);font-size:13px;outline:none;transition:border-color .15s}
.srch:focus{border-color:var(--acc)}.srch::placeholder{color:var(--dim)}
.stats{color:var(--dim);font-size:12px;margin-left:auto;white-space:nowrap}

.item{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.hd{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none}
.ic{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.nm{flex:1;font-size:14px;font-weight:500;font-family:"JetBrains Mono","Fira Code","Cascadia Code",monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lang{font-size:11px;padding:2px 8px;border-radius:12px;background:#1c2128;color:var(--dim);border:1px solid var(--bdr);flex-shrink:0}
.sz{font-size:11px;color:var(--dim);flex-shrink:0;min-width:50px;text-align:right}
.arr{transition:transform .2s;color:var(--dim);font-size:12px;flex-shrink:0}
.item.open .arr{transform:rotate(90deg)}
.bd{display:none}.item.open .bd{display:block}
.acts{display:flex;gap:8px;padding:0 16px 10px}
.cpb{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--bdr);border-radius:var(--r);background:#1c2128;color:var(--dim);cursor:pointer;font-size:12px;transition:all .15s}
.cpb:hover{border-color:var(--acc);color:var(--ach)}.cpb.done{border-color:var(--ok);color:var(--ok)}
.code{margin:0 16px 16px;border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr)}
.code pre{margin:0;padding:16px;overflow-x:auto;max-height:520px;overflow-y:auto}
.code code{font-family:"JetBrains Mono","Fira Code","Cascadia Code","Consolas",monospace;font-size:13px;line-height:1.6;tab-size:4}
.msg{text-align:center;padding:60px 20px;color:var(--dim)}
.msg .mi{font-size:36px;margin-bottom:16px}
.msg p{font-size:14px;margin-bottom:6px}
.msg .d2{font-size:12px;opacity:.7;margin-top:12px;line-height:1.7}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:16px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 24px;border-radius:var(--r);font-size:13px;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.on{opacity:1}
@media(max-width:600px){body{padding:12px}.lang,.sz{display:none}}
</style>
</head>
<body>
<div class="wrap">
<h1>常用代码列表</h1>
<p class="sub" id="subtitle">自动读取 <code>list/</code> 文件夹</p>
<div class="row">
<input class="srch" id="search" placeholder="搜索文件名... (Ctrl+K)" disabled>
<button class="btn" id="expandAll" disabled>全部展开</button>
<button class="btn" id="collapseAll" disabled>全部折叠</button>
<span class="stats" id="stats"></span>
</div>
<div id="list"><div class="msg"><div class="spin"></div><p>正在加载...</p></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
var FILES = [];

var LANG = { py:'python',js:'javascript',ts:'typescript',jsx:'jsx',tsx:'tsx',json:'json',xml:'xml',html:'html',htm:'html',css:'css',scss:'scss',md:'markdown',yaml:'yaml',yml:'yaml',sql:'sql',sh:'bash',bash:'bash',bat:'batch',ps1:'powershell',toml:'toml',ini:'ini',cfg:'ini',conf:'ini',c:'c',cpp:'cpp',java:'java',go:'go',rs:'rust',rb:'ruby',php:'php',swift:'swift',kt:'kotlin',lua:'lua',dart:'dart',vue:'xml',svelte:'html',graphql:'graphql',proto:'protobuf',dockerfile:'dockerfile',makefile:'makefile',txt:'plaintext' };
var ICONS = { py:'🐍',js:'🟨',ts:'🔷',jsx:'⚛️',tsx:'⚛️',json:'📋',xml:'📄',html:'🌐',css:'🎨',scss:'🎨',md:'📖',yaml:'📝',yml:'📝',sql:'🗄️',sh:'💻',bash:'💻',dockerfile:'🐳',toml:'⚙️',ini:'⚙️',go:'🔵',rs:'🦀',java:'☕',c:'⚡',cpp:'⚡',rb:'💎',php:'🐘',swift:'🦅',kt:'🟣',lua:'🌙',txt:'📄' };

function ext(n){ var e=n.lastIndexOf('.'); return e===-1?'txt':n.substring(e+1).toLowerCase() }
function fmtSize(b){ return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB' }
function toast(m){ var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2000) }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function showMsg(icon,msg,detail){
  document.getElementById('list').innerHTML=
    '<div class="msg"><div class="mi">'+icon+'</div><p>'+msg+'</p>'+(detail?'<p class="d2">'+detail+'</p>':'')+'</div>';
  document.getElementById('stats').textContent='';
}

function enable(b){
  document.getElementById('search').disabled=!b;
  document.getElementById('expandAll').disabled=!b;
  document.getElementById('collapseAll').disabled=!b;
}

// ======== 渲染列表 ========
function render(){
  if(!FILES.length){ showMsg('📂','没有找到文件'); return }
  enable(true);
  document.getElementById('stats').textContent='共 '+FILES.length+' 个文件';

  var el=document.getElementById('list');
  el.innerHTML=FILES.map(function(f,i){
    return '<div class="item" data-name="'+esc(f.name)+'" data-idx="'+i+'">'+
      '<div class="hd" onclick="toggleItem(this)">'+
        '<span class="ic">'+(ICONS[ext(f.name)]||'📄')+'</span>'+
        '<span class="nm" title="'+esc(f.name)+'">'+esc(f.name)+'</span>'+
        '<span class="lang">'+(LANG[ext(f.name)]||'plaintext')+'</span>'+
        '<span class="sz">'+fmtSize(f.size)+'</span>'+
        '<span class="arr">▶</span>'+
      '</div>'+
      '<div class="bd">'+
        '<div class="acts"><button class="cpb" data-idx="'+i+'">📋 复制代码</button></div>'+
        '<div class="code">'+
          (f.content
            ? '<pre><code class="language-'+(LANG[ext(f.name)]||'plaintext')+'">'+esc(f.content)+'</code></pre>'
            : '<div style="padding:16px;color:var(--dim)">加载中...</div>')+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  el.querySelectorAll('pre code').forEach(function(b){ hljs.highlightElement(b) });
  el.querySelectorAll('.cpb').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();
      var idx=parseInt(b.getAttribute('data-idx'));
      copyCode(FILES[idx].content,b);
    });
  });
}

function toggleItem(hd){
  var item=hd.parentElement;
  item.classList.toggle('open');
  if(!item.classList.contains('open')) return;
  var codeEl=item.querySelector('.code');
  if(codeEl.querySelector('pre')) return; // 已渲染
  var idx=parseInt(item.dataset.idx);
  if(FILES[idx].content){
    codeEl.innerHTML='<pre><code class="language-'+(LANG[ext(FILES[idx].name)]||'plaintext')+'">'+esc(FILES[idx].content)+'</code></pre>';
    hljs.highlightElement(codeEl.querySelector('code'));
  }
}

function copyCode(content,btn){
  navigator.clipboard.writeText(content).then(function(){
    btn.classList.add('done');btn.textContent='✓ 已复制';toast('代码已复制到剪贴板');
    setTimeout(function(){btn.classList.remove('done');btn.textContent='📋 复制代码'},2000);
  }).catch(function(){
    btn.textContent='⚠ 复制失败';
    setTimeout(function(){btn.textContent='📋 复制代码'},2000);
  });
}

// 搜索
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.toLowerCase(),v=0;
  document.querySelectorAll('.item').forEach(function(it){
    var show=it.dataset.name.toLowerCase().indexOf(q)!==-1;
    it.style.display=show?'':'none';if(show)v++;
  });
  document.getElementById('stats').textContent=q?'匹配 '+v+'/'+FILES.length+' 个':'共 '+FILES.length+' 个文件';
});

// 全部展开/折叠
document.getElementById('expandAll').addEventListener('click',function(){
  document.querySelectorAll('.item').forEach(function(it){
    if(it.style.display==='none')return;
    it.classList.add('open');
    var idx=parseInt(it.dataset.idx);
    var codeEl=it.querySelector('.code');
    if(!codeEl.querySelector('pre')&&FILES[idx].content){
      codeEl.innerHTML='<pre><code class="language-'+(LANG[ext(FILES[idx].name)]||'plaintext')+'">'+esc(FILES[idx].content)+'</code></pre>';
      hljs.highlightElement(codeEl.querySelector('code'));
    }
  });
});
document.getElementById('collapseAll').addEventListener('click',function(){
  document.querySelectorAll('.item').forEach(function(it){it.classList.remove('open')});
});

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('search').focus()}
  if(e.key==='Escape'){document.getElementById('search').value='';document.getElementById('search').dispatchEvent(new Event('input'));document.getElementById('collapseAll').click()}
});

// ======== 模式 1：GitHub Pages — API 自动读取 ========
function detectGH(){
  var host=window.location.hostname;
  if(!host.endsWith('.github.io'))return null;
  var user=host.replace('.github.io','');
  var parts=window.location.pathname.split('/').filter(Boolean);
  var repo=parts[0]||(user+'.github.io');
  // list/ 目录 = index.html 所在的子目录下的 list/
  var subdir=parts.slice(1).join('/').replace(/\/?index\.html$/,'');
  var listDir=subdir?subdir+'/list':'list';
  return { user:user, repo:repo, branch:'main', listDir:listDir };
}

async function loadFromGitHub(gh){
  document.getElementById('subtitle').innerHTML=
    'GitHub Pages · <code>'+gh.user+'/'+gh.repo+'</code> · 自动读取 <code>'+gh.listDir+'/</code>';

  var api='https://api.github.com/repos/'+encodeURIComponent(gh.user)+'/'+
    encodeURIComponent(gh.repo)+'/contents/'+gh.listDir+'?ref='+encodeURIComponent(gh.branch);
  var resp;
  try{ resp=await fetch(api) }
  catch(e){ showMsg('🔌','无法连接 GitHub API'); return }
  if(resp.status===404){
    showMsg('📂','未找到 list/ 目录','请在仓库根目录创建 <code>list/</code> 文件夹。分支: <code>'+gh.branch+'</code>');
    return;
  }
  if(!resp.ok){
    if(resp.status===403)showMsg('⏳','API 请求次数用尽','一小时后再试');
    else showMsg('❌','请求失败 (HTTP '+resp.status+')');
    return;
  }
  var fileList=await resp.json();
  if(!Array.isArray(fileList)||!fileList.length){ showMsg('📂','list/ 文件夹为空'); return }

  showMsg('⏳','正在加载 '+fileList.length+' 个文件...','');

  var loaded=[];
  for(var i=0;i<fileList.length;i++){
    var f=fileList[i];
    if(f.type!=='file')continue;
    try{
      var cr=await fetch(f.download_url);
      if(!cr.ok)continue;
      loaded.push({ name:f.name, size:f.size, content:await cr.text() });
    }catch(e){}
  }
  if(!loaded.length){ showMsg('⚠️','文件内容加载失败'); return }
  loaded.sort(function(a,b){return a.name.localeCompare(b.name)});
  FILES=loaded;
  render();
}

// ======== 模式 2：本地 — File System Access API ========
async function loadLocal(){
  document.getElementById('subtitle').innerHTML='本地模式 · 选择 <code>list/</code> 文件夹后读取';

  if(!('showDirectoryPicker' in window)){
    showMsg('🌐','浏览器不支持',
      '请使用 Chrome 或 Edge 打开。<br>或部署到 GitHub Pages 实现完全自动化。');
    return;
  }

  showMsg('📁','请选择 list 文件夹',
    '<button class="btn" id="pickBtn" style="font-size:14px;padding:10px 20px;margin-top:12px">📂 选择 list 文件夹</button>'+
    '<br><br>点击按钮后，在弹出的对话框中找到并选中 <code>list/</code> 文件夹');

  document.getElementById('pickBtn').addEventListener('click',async function(){
    try{
      var dir=await window.showDirectoryPicker({mode:'read'});
      showMsg('⏳','正在读取文件...','文件夹: '+dir.name);
      var loaded=[];
      for await(var [name,handle] of dir.entries()){
        if(handle.kind!=='file')continue;
        try{
          var file=await handle.getFile();
          loaded.push({name:name,size:file.size,content:await file.text()});
        }catch(e){}
      }
      if(!loaded.length){ showMsg('📂','所选文件夹中没有文件'); return }
      loaded.sort(function(a,b){return a.name.localeCompare(b.name)});
      FILES=loaded;
      render();
    }catch(e){
      if(e.name!=='AbortError')showMsg('❌','读取失败',e.message);
    }
  });
}

// ======== 启动 ========
(function init(){
  var gh=detectGH();
  if(gh) loadFromGitHub(gh);
  else loadLocal();
})();
</script>
</body>
</html>
