<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 工作流编辑器 — 节点式可视化</title>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css">
<script crossorigin src="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-canvas: #0a0e14;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent-blue: #58a6ff;
  --accent-purple: #bc8cff;
  --accent-green: #3fb950;
  --accent-orange: #d2991d;
  --accent-red: #f85149;
  --accent-cyan: #39d2c0;
  --node-bg: #1c2128;
  --shadow: 0 4px 12px rgba(0,0,0,0.4);
  --radius: 8px;
  --radius-sm: 4px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  overflow: hidden; height: 100vh; width: 100vw;
}
#root { width: 100%; height: 100%; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-tertiary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── App Layout ── */
.app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

/* ── Sidebar ── */
.sidebar {
  width: 260px; min-width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width var(--transition), min-width var(--transition), opacity var(--transition);
  overflow: hidden; z-index: 10; position: relative;
}
.sidebar.collapsed { width: 0; min-width: 0; opacity: 0; border-right: none; }
.sidebar-header {
  padding: 12px 16px 12px 48px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.sidebar-header h2 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; }
.sidebar-toggle {
  position: absolute; top: 12px; left: 12px; z-index: 20;
  width: 32px; height: 32px;
  border: 1px solid var(--border); background: var(--bg-tertiary);
  color: var(--text-secondary); border-radius: var(--radius-sm);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all var(--transition);
}
.sidebar-toggle:hover { background: var(--border); color: var(--text-primary); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }

/* ── Category ── */
.category { margin-bottom: 4px; }
.category-header {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  cursor: pointer; border-radius: var(--radius-sm);
  color: var(--text-secondary); font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  transition: background var(--transition); user-select: none;
}
.category-header:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.category-header .arrow { font-size: 10px; transition: transform var(--transition); width: 12px; text-align: center; }
.category-header .arrow.expanded { transform: rotate(90deg); }
.category-icon { width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; }

/* ── Node Items (sidebar) ── */
.node-items { overflow: hidden; }
.node-items.collapsed { max-height: 0; }
.node-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 12px 7px 32px;
  cursor: grab; border-radius: var(--radius-sm); font-size: 13px;
  color: var(--text-secondary); transition: all var(--transition);
  user-select: none; border: 1px solid transparent;
}
.node-item:hover { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border); }
.node-item:active { cursor: grabbing; }
.node-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Canvas ── */
.canvas-wrap { flex: 1; position: relative; background: var(--bg-canvas); }
.react-flow__background { background: var(--bg-canvas) !important; }
.react-flow__minimap { background: var(--bg-secondary) !important; border: 1px solid var(--border) !important; border-radius: var(--radius-sm) !important; }
.react-flow__controls {
  border: 1px solid var(--border) !important; border-radius: var(--radius-sm) !important;
  overflow: hidden; box-shadow: var(--shadow) !important;
}
.react-flow__controls-button {
  background: var(--bg-tertiary) !important; border-bottom: 1px solid var(--border) !important;
  fill: var(--text-secondary) !important; width: 28px !important; height: 28px !important;
}
.react-flow__controls-button:hover { background: var(--border) !important; }
.react-flow__controls-button svg { fill: var(--text-secondary) !important; }
.react-flow__controls-button:hover svg { fill: var(--text-primary) !important; }

/* ── Top Bar ── */
.topbar { position: absolute; top: 12px; right: 12px; z-index: 10; display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 7px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all var(--transition); display: flex; align-items: center; gap: 6px; white-space: nowrap;
  background: var(--bg-tertiary); color: var(--text-primary); font-family: inherit;
}
.btn:hover { background: var(--border); }
.btn-primary { background: #8250df; border-color: #8250df; color: #fff; }
.btn-primary:hover { background: #9b6dff; box-shadow: 0 0 12px rgba(130,80,223,0.4); }
.btn-danger { border-color: #f85149; color: #f85149; background: transparent; }
.btn-danger:hover { background: rgba(248,81,73,0.1); }

/* ── Custom Nodes ── */
.custom-node {
  background: var(--node-bg); border: 2px solid var(--border);
  border-radius: var(--radius); min-width: 220px;
  font-size: 13px; box-shadow: var(--shadow);
  transition: box-shadow var(--transition), border-color var(--transition);
}
.custom-node:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.custom-node.selected { border-color: var(--accent-blue) !important; }
.custom-node.running { border-color: var(--accent-orange) !important; box-shadow: 0 0 16px rgba(210,153,29,0.3); }
.custom-node.success { border-color: var(--accent-green) !important; }
.custom-node.error { border-color: var(--accent-red) !important; box-shadow: 0 0 16px rgba(248,81,73,0.3); }

.node-header {
  padding: 8px 12px; border-radius: 6px 6px 0 0;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600; color: #fff; cursor: default; user-select: none;
}
.node-header-icon { font-size: 14px; flex-shrink: 0; }
.hdr-input { background: #1f6feb; }
.hdr-ai { background: #8250df; }
.hdr-process { background: #238636; }
.hdr-preview { background: #0ea5a9; }
.hdr-utility { background: #555; }
.hdr-logic { background: #f0883e; }

.node-body { padding: 8px 12px 4px; display: flex; flex-direction: column; gap: 4px; }
.node-field { display: flex; flex-direction: column; gap: 2px; }
.node-field label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.02em; }
.node-field input, .node-field textarea, .node-field select {
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  padding: 4px 8px; font-size: 12px; font-family: inherit; outline: none;
  transition: border-color var(--transition); width: 100%;
}
.node-field input:focus, .node-field textarea:focus, .node-field select:focus { border-color: var(--accent-blue); }
.node-field textarea { resize: vertical; min-height: 40px; font-family: 'Consolas', 'Monaco', monospace; }
.node-field input[type="number"] { width: 75px; -moz-appearance: textfield; }
.node-field input[type="number"]::-webkit-inner-spin-button,
.node-field input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* ── Handles ── */
.handle-row { display: flex; align-items: center; min-height: 18px; position: relative; padding: 1px 0; }
.handle-row.left { padding-left: 8px; }
.handle-row.right { justify-content: flex-end; padding-right: 8px; }
.handle-label { font-size: 9px; color: var(--text-muted); white-space: nowrap; pointer-events: none; }

.react-flow__handle {
  width: 10px !important; height: 10px !important;
  border: 2px solid var(--border) !important;
  background: var(--bg-tertiary) !important;
  transition: all var(--transition); z-index: 5;
}
.react-flow__handle:hover { background: var(--accent-blue) !important; border-color: var(--accent-blue) !important; transform: scale(1.3); }
.react-flow__handle-left { left: -5px !important; }
.react-flow__handle-right { right: -5px !important; }

/* Handle type colors */
.react-flow__handle.handle-s { background: #58a6ff !important; border-color: #58a6ff !important; }
.react-flow__handle.handle-n { background: #3fb950 !important; border-color: #3fb950 !important; }
.react-flow__handle.handle-i { background: #bc8cff !important; border-color: #bc8cff !important; }
.react-flow__handle.handle-v { background: #d2991d !important; border-color: #d2991d !important; }
.react-flow__handle.handle-a { background: #6e7681 !important; border-color: #6e7681 !important; }

/* ── Edges ── */
.react-flow__edge-path { stroke: #6e7681 !important; stroke-width: 2px !important; }
.react-flow__edge.selected .react-flow__edge-path { stroke: var(--accent-blue) !important; stroke-width: 3px !important; }
.react-flow__edge:hover .react-flow__edge-path { stroke: var(--text-secondary) !important; }
.react-flow__connection-line { stroke: var(--accent-blue) !important; stroke-width: 2px !important; }
/* Execution flow animation */
@keyframes dashdraw { to { stroke-dashoffset: -10; } }
.react-flow__edge.animated .react-flow__edge-path {
  stroke-dasharray: 8;
  animation: dashdraw 0.4s linear infinite;
}
/* Yellow execution highlight */
.react-flow__edge.executing .react-flow__edge-path {
  stroke: #d2991d !important;
  stroke-width: 4px !important;
  filter: drop-shadow(0 0 6px rgba(210,153,29,0.5));
}

/* ── Context Menu ── */
.context-menu {
  position: fixed; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,0.6); padding: 6px;
  z-index: 1000; min-width: 220px; max-height: 400px; overflow-y: auto;
}
.context-menu-search {
  width: 100%; background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  padding: 6px 10px; font-size: 12px; outline: none; margin-bottom: 4px; font-family: inherit;
}
.context-menu-search:focus { border-color: var(--accent-blue); }
.context-menu-search::placeholder { color: var(--text-muted); }
.context-menu-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
  color: var(--text-secondary); transition: all 0.1s;
}
.context-menu-item:hover { background: var(--accent-blue); color: #fff; }
.context-menu-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.context-menu-category {
  font-size: 10px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.05em; padding: 6px 10px 2px; font-weight: 600;
}

/* ── Preview ── */
.node-preview-img { max-width: 200px; max-height: 150px; border-radius: var(--radius-sm); border: 1px solid var(--border); object-fit: contain; background: var(--bg-primary); }
.preview-scroll::-webkit-scrollbar { height: 4px; }
.preview-scroll::-webkit-scrollbar-track { background: transparent; }
.preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.preview-scroll-v::-webkit-scrollbar { width: 4px; }
.preview-scroll-v::-webkit-scrollbar-track { background: transparent; }
.preview-scroll-v::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.node-preview-placeholder {
  width: 180px; height: 100px; background: var(--bg-primary);
  border: 1px dashed var(--border); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 11px;
}
.node-info-row { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; }
.node-info-row .lbl { color: var(--text-muted); }
.node-info-row .val { color: var(--accent-green); font-family: 'Consolas', 'Monaco', monospace; }

.node-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: auto;
}
.node-badge-running { background: rgba(210,153,29,0.2); color: var(--accent-orange); }
.node-badge-success { background: rgba(63,185,80,0.2); color: var(--accent-green); }
.node-badge-error { background: rgba(248,81,73,0.2); color: var(--accent-red); }

.canvas-hint {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  color: var(--text-muted); font-size: 12px; pointer-events: none; opacity: 0.6;
}

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 16px; font-size: 13px;
  color: var(--text-primary); box-shadow: var(--shadow); z-index: 2000;
  animation: toastIn 0.3s ease;
}
.toast.err { border-color: var(--accent-red); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Error fallback ── */
.error-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; background: #0d1117; color: #f85149;
  font-family: monospace; font-size: 14px; flex-direction: column; gap: 8px;
}
